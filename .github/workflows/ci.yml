name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'sunshift/backend/requirements.txt'

      - name: Install dependencies
        run: |
          cd sunshift/backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Run ruff lint check
        run: |
          cd sunshift/backend
          ruff check .

      - name: Run pytest with coverage
        run: |
          cd sunshift/backend
          pytest --cov=. --cov-report=xml --cov-report=term-missing || true

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: sunshift/backend/coverage.xml
          fail_ci_if_error: false

  dashboard:
    name: Dashboard (Node 22)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'sunshift/dashboard/package-lock.json'

      - name: Install dependencies
        run: |
          cd sunshift/dashboard
          npm ci

      - name: Run ESLint
        run: |
          cd sunshift/dashboard
          npm run lint

      - name: Build Next.js application
        run: |
          cd sunshift/dashboard
          npm run build
